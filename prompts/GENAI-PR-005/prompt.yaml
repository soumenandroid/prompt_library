description: Generates realistic synthetic test data for given schemas, with realistic
  distributions and edge-case rows.
input_description: Data schema or DB table definition
output_description: JSON or CSV test data rows
template: 'Generate {{count}} rows of realistic test data for the following schema:


  {{schema}}


  Constraints:

  - No real PII — use realistic but fictional values

  - Follow realistic value distributions for the domain

  - Include edge-case rows: nulls where nullable, max-length strings, boundary numbers,
  empty arrays

  - Last 2 rows should be error/boundary cases


  Output as a JSON array.'
