description: Analyses code changes and scores regression risk per module. Helps prioritise
  what to test first.
input_description: Git diff or list of changed files
output_description: Risk score per module + recommended test areas
template: 'You are a QA risk analyst. Given the following code changes:


  {{git_diff}}


  Analyse and provide:

  1. Risk score per changed module (High/Medium/Low) with justification

  2. Top 5 test areas to prioritise

  3. Recommended test types (unit, integration, E2E) per area

  4. Any regression hotspots to watch'
