description: Converts user stories or acceptance criteria into well-formed Gherkin
  BDD scenarios.
input_description: User story or acceptance criteria text
output_description: Given/When/Then scenarios in Gherkin format
template: 'You are a BDD expert. Convert the following user story into Gherkin scenarios:


  {{user_story}}


  Rules:

  - Use Given/When/Then format

  - Include Background if shared context exists

  - Generate at least 3 scenarios: happy path, error case, edge case

  - Use concrete examples, not abstract placeholders'
